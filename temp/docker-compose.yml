  # Nginx Reverse Proxy（统一入口 - 80端口）
  nginx:
    image: nginx:alpine
    container_name: arbore-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # 3.100 本地服务器不需要 SSL 证书
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"   # HTTP 端口（3.100 本地服务器只需要 HTTP）
    networks:
      - arbore-network
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 允许容器访问宿主机服务
    # depends_on 已移除：web-admin-frontend 已移到宿主机运行，service-router 已移除
