services:
  # PostgreSQL for NocoBase (Arbore-Func)
  postgres-nocobase:
    image: postgres:16
    container_name: arbore-postgres-nocobase
    restart: unless-stopped
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_DB: ${POSTGRES_NOCOBASE_DB:-arbore}
      POSTGRES_USER: ${POSTGRES_NOCOBASE_USER:-arbore}
      POSTGRES_PASSWORD: ${POSTGRES_NOCOBASE_PASSWORD:-arbore}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres-nocobase:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - arbore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_NOCOBASE_USER:-arbore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Arbore-Flow (n8n)
  arbore-flow:
    image: arbore-prod:001.0063
    container_name: arbore-flow
    restart: unless-stopped
    networks:
      - arbore-network
    environment:
      - NODE_ENV=production
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=flow.fungo.co.th
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://flow.fungo.co.th:5678
      - WEBHOOK_URL=https://flow.fungo.co.th:5678/
      - N8N_PUSH_BACKEND=websocket
      - N8N_DEFAULT_LOCALE=en
      - N8N_PROXY_HOPS=1
      - N8N_SECURE_COOKIE=true
      # 与 arbore-prod:001.0063 镜像约定：数据在 /app/data（见 flow構建方法.md）
      - N8N_DATABASE_SQLITE_DATABASE=/app/data/arbore-flow/database.sqlite
      - N8N_DB_SQLITE_DATABASE=/app/data/arbore-flow/database.sqlite
    volumes:
      - ./data:/app/data
      - ./custom-nodes:/app/custom-nodes
      - ./license.json:/app/license.json
      - ./ssl:/app/ssl:ro
    ports:
      # 与 nginx 反代配套：nginx 通过 127.0.0.1:15678 转发到容器 5678
      - "127.0.0.1:15678:5678"
    expose:
      - "5678"
    # 跳过镜像内 docker-entrypoint，避免默认 ./start.sh 与旧路径问题
    entrypoint: ["/bin/sh", "/app/start-prod.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Arbore-Func (NocoBase 2.x，替换原 1.9)
  arbore-func:
    image: nocobase/nocobase:beta-full
    container_name: arbore-func
    restart: unless-stopped
    networks:
      - arbore-network
    environment:
      - APP_KEY=${ARBORE_FUNC_APP_KEY:-arbore-secret-key-2024}
      - ENCRYPTION_FIELD_KEY=${ARBORE_FUNC_ENCRYPTION_KEY:-arbore-secret-key-2024}
      - DB_DIALECT=postgres
      - DB_HOST=postgres-nocobase
      - DB_PORT=5432
      - DB_DATABASE=${POSTGRES_NOCOBASE_DB:-nocobase2}
      - DB_USER=${POSTGRES_NOCOBASE_USER:-arbore}
      - DB_PASSWORD=${POSTGRES_NOCOBASE_PASSWORD:-arbore}
      - TZ=Asia/Shanghai
    volumes:
      - ./data/arbore-func/storage:/app/nocobase/storage
    ports:
      - "13000:80"  # 3.100 服务器需要直接访问
    expose:
      - "80"
    depends_on:
      postgres-nocobase:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # PostgreSQL for Vector Database (with pgvector)
  postgres-vector:
    image: pgvector/pgvector:pg15
    container_name: arbore-postgres-vector
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_VECTOR_DB:-vector_db}
      POSTGRES_USER: ${POSTGRES_VECTOR_USER:-arbore}
      POSTGRES_PASSWORD: ${POSTGRES_VECTOR_PASSWORD:-arbore}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres-vector:/var/lib/postgresql/data
      - ./init-scripts/init-postgres-vector.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - arbore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_VECTOR_USER:-arbore} -d ${POSTGRES_VECTOR_DB:-vector_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (AI Model Service)
  ollama:
    image: ollama/ollama:latest
    container_name: arbore-ollama
    restart: unless-stopped
    privileged: true
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_GPU=1
      - OLLAMA_NUM_THREAD=8
      - OLLAMA_FLASH_ATTENTION=false
      - OLLAMA_CONTEXT_LENGTH=4096
      - OLLAMA_VULKAN=1
      # 移除GPU设备覆盖，让Ollama自动检测
      # - VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/radeon_icd.x86_64.json
      # - GGML_VK_VISIBLE_DEVICES=0
      # - HIP_VISIBLE_DEVICES=0
      # - HSA_OVERRIDE_GFX_VERSION=11.0.0
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - arbore-network
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - video
    deploy:
      resources:
        limits:
          memory: 96G
        reservations:
          memory: 80G
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

