# Web Admin HTTPS 配置
# 证书适用于 *.fungo.co.th，请使用域名访问（如 admin.fungo.co.th:9000）
# 证书路径：/home/arbore/console/ssl/

# n8n / WebSocket：仅在 Upgrade 时转发 upgrade，否则使用 close，避免长连接异常
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 9000 - Web Admin 前端 + API
server {
    listen 9000 ssl;
    server_name localhost _;
    root /home/arbore/console/web-admin/frontend/dist;
    index index.html;

    ssl_certificate /home/arbore/console/ssl/fullchain.pem;
    ssl_certificate_key /home/arbore/console/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 20G;
    proxy_request_buffering off;

    location /admin-api/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

#
# 5678 - arbore-flow（Nginx 终止 SSL，反代到宿主机 15678）
#
server {
    listen 5678 ssl;
    server_name flow.fungo.co.th _;

    ssl_certificate /home/arbore/console/ssl/fullchain.pem;
    ssl_certificate_key /home/arbore/console/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 20G;
    proxy_request_buffering off;

    location /rest/push {
        proxy_pass http://127.0.0.1:15678;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # n8n 会校验 Origin/Host，避免上游收到带端口的 Host/Origin
        # 浏览器 Origin: https://flow.fungo.co.th:5678
        proxy_set_header Host flow.fungo.co.th;
        proxy_set_header Origin https://flow.fungo.co.th;
        proxy_set_header X-Forwarded-Host flow.fungo.co.th;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;

        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    location / {
        proxy_pass http://127.0.0.1:15678;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # 同步修正 Host/Origin 校验
        proxy_set_header Host flow.fungo.co.th;
        proxy_set_header Origin https://flow.fungo.co.th;
        proxy_set_header X-Forwarded-Host flow.fungo.co.th;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        proxy_buffering off;
    }
}

#
# 13000 - arbore-func（反代到宿主机 13080）
#
server {
    listen 13000 ssl;
    server_name func.fungo.co.th _;

    ssl_certificate /home/arbore/console/ssl/fullchain.pem;
    ssl_certificate_key /home/arbore/console/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 20G;
    proxy_request_buffering off;

    location / {
        proxy_pass http://127.0.0.1:13080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }
}
